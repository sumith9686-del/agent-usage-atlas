name: Publish Homebrew Formula

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Create GitHub Release & upload sdist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" --generate-notes
          gh release upload "$TAG" dist/*.tar.gz --clobber

      - name: Generate formula (uses release tarball SHA)
        run: python scripts/generate_formula.py

      - name: Push formula to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          git clone https://x-access-token:${TAP_TOKEN}@github.com/heggria/homebrew-tap.git /tmp/tap
          cp Formula/agent-usage-atlas.rb /tmp/tap/Formula/agent-usage-atlas.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-usage-atlas.rb
          git commit -m "agent-usage-atlas ${VERSION}" || echo "No changes"
          git push
