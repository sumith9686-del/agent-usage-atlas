<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Usage Atlas</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css" media="print" onload="this.media='all'">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10",
    "preact/hooks": "https://esm.sh/preact@10/hooks",
    "htm": "https://esm.sh/htm@3"
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* ── Global polish ── */
html{scroll-behavior:smooth}
::selection{background:rgba(240,184,102,.3);color:var(--text)}
[data-theme="light"] ::selection{background:rgba(200,127,32,.25);color:#1a1a2e}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22)}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12)}
[data-theme="light"] ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.22)}
:root{
  --bg:#0d1016;
  --surface:rgba(255,255,255,.04);
  --surface-strong:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);
  --text:#ece7df;
  --text-secondary:rgba(255,255,255,.7);
  --text-muted:rgba(255,255,255,.42);
  --accent:#f0b866;
  --codex:#ff8a50;
  --claude:#ffd43b;
  --cursor:#748ffc;
  --uncached:#f4b183;
  --cache-read:#51cf66;
  --cache-write:#b197fc;
  --output:#74c0fc;
  --reason:#e599f7;
  --cost:#ff6b6b;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 18px 70px rgba(0,0,0,.26);
}
body{
  min-height:100vh;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,138,80,.16), transparent 26%),
    radial-gradient(circle at top right, rgba(116,192,252,.12), transparent 24%),
    linear-gradient(180deg, #131722 0%, #0d1016 58%, #0b0d12 100%);
  font:14px/1.6 Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;
}
.page{max-width:1460px;margin:0 auto;padding:20px 12px 40px}
.g{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g-wide{grid-template-columns:2.1fr 1fr}
.g-story{grid-template-columns:1.15fr .85fr}
.mt{margin-top:12px}
.p{
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
}
.hero-wrap{backdrop-filter:blur(22px)}
.hero-wrap{position:relative;overflow:hidden;padding:28px 24px}
/* ── 2. Hero background breathing ── */
.hero-wrap::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 16% 18%, rgba(255,138,80,.18), transparent 18%),
    radial-gradient(circle at 86% 12%, rgba(240,184,102,.18), transparent 20%),
    radial-gradient(circle at 50% 90%, rgba(116,192,252,.12), transparent 22%),
    linear-gradient(135deg, rgba(255,255,255,.02), transparent 55%);
  pointer-events:none;
  animation:hero-glow 6s ease-in-out infinite alternate;
}
@keyframes hero-glow{
  0%{opacity:.7;filter:blur(0px)}
  100%{opacity:1;filter:blur(2px)}
}
/* ── Toast notification ── */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  z-index:9999;padding:10px 22px;border-radius:999px;
  font-size:12px;font-weight:600;letter-spacing:.02em;
  color:#fff;pointer-events:none;opacity:0;
  transition:transform .4s cubic-bezier(.16,1,.3,1), opacity .4s ease;
  box-shadow:0 8px 32px rgba(0,0,0,.45);
  display:flex;align-items:center;gap:8px;
  backdrop-filter:blur(16px);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:rgba(81,207,102,.18);border:1px solid rgba(81,207,102,.35);color:#a3e635}
.toast.err{background:rgba(255,107,107,.18);border:1px solid rgba(255,107,107,.35);color:#ff6b6b}
.toast.info{background:rgba(116,192,252,.15);border:1px solid rgba(116,192,252,.3);color:#74c0fc}
.toast .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Live badge ── */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  margin-left:auto;padding:3px 10px;border-radius:999px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  transition:background .3s,color .3s;
}
.live-badge.connected{background:rgba(81,207,102,.15);color:#51cf66}
.live-badge.connected .dot{background:#51cf66;box-shadow:0 0 6px #51cf66}
.live-badge.disconnected{background:rgba(255,107,107,.15);color:#ff6b6b}
.live-badge.disconnected .dot{background:#ff6b6b}
.live-badge.off{background:rgba(255,255,255,.06);color:var(--text-muted)}
.live-badge.off .dot{background:var(--text-muted)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.live-badge.connected .dot{animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.35}}

.lang-btn{
  display:inline-flex;align-items:center;gap:4px;
  margin-left:8px;padding:3px 10px;border-radius:999px;
  font-size:10px;font-weight:700;letter-spacing:.08em;
  cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);
  color:var(--text-muted);transition:all .2s;user-select:none;
}
.lang-btn:hover{background:rgba(255,255,255,.12);color:var(--text)}
.range-tabs{display:flex;gap:4px;margin-top:10px}
.range-tab{
  padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid rgba(255,255,255,.08);background:transparent;
  color:var(--text-muted);transition:all .2s;user-select:none;letter-spacing:.02em;
}
.range-tab:hover{background:rgba(255,255,255,.06);color:var(--text)}
.range-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}

.eyebrow{
  display:flex;align-items:center;gap:8px;
  color:var(--accent);
  font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
}
/* ── 3. H1 shimmer ── */
h1{
  margin-top:10px;
  max-width:13ch;
  font-size:clamp(28px,4vw,48px);
  line-height:.95;
  font-weight:900;
  letter-spacing:-.045em;
  background:linear-gradient(135deg,var(--text),var(--accent),var(--text),var(--accent));
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:h1-shimmer 8s ease-in-out infinite;
}
@keyframes h1-shimmer{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.hero-copy{margin-top:10px;max-width:62ch;color:var(--text-secondary);font-size:13px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
/* ── 4. Chip hover effects ── */
.chip{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
  color:var(--text-secondary);font-size:12px;
  position:relative;
  transition:transform .3s cubic-bezier(.22,1,.36,1),background .3s ease,border-color .3s ease,box-shadow .3s ease;
}
.chip:hover{transform:translateY(-2px);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18)}
.chip:nth-child(1):hover{border-color:rgba(255,138,80,.45);box-shadow:0 0 16px rgba(255,138,80,.15)}
.chip:nth-child(2):hover{border-color:rgba(255,107,107,.45);box-shadow:0 0 16px rgba(255,107,107,.15)}
.chip:nth-child(3):hover{border-color:rgba(81,207,102,.45);box-shadow:0 0 16px rgba(81,207,102,.15)}
.chip:nth-child(4):hover{border-color:rgba(240,184,102,.45);box-shadow:0 0 16px rgba(240,184,102,.15)}

/* ── Hero-stats mini grid ── */
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.hero-stat{
  padding:8px 10px;border-radius:10px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.05);
  transition:transform .35s cubic-bezier(.22,1,.36,1),background .3s ease,border-color .3s ease;
}
.hero-stat:hover{transform:translateY(-2px);background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}
.hero-stat .k{color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.hero-stat .v{margin-top:4px;font-size:14px;font-weight:700}

/* ── Source proportion bar ── */
.source-bar-wrap{margin-top:14px}
.source-bar{display:flex;height:6px;border-radius:3px;overflow:hidden}
.source-bar .seg{transition:width .6s cubic-bezier(.22,1,.36,1)}
.source-bar-legend{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.source-bar-label{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary)}
.sbl-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}

.side{display:grid;gap:12px;align-content:start}
/* ── 5. Summary card (.sc) enhanced hover ── */
.sc,.cc{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:14px;
}
.sc{position:relative;overflow:hidden}
.sc::after{
  content:"";position:absolute;inset:0;border-radius:inherit;opacity:0;
  transition:opacity .4s ease;pointer-events:none;
}
.sc:nth-child(1)::after{background:radial-gradient(ellipse at 50% 0%,rgba(255,138,80,.08),transparent 70%)}
.sc:nth-child(2)::after{background:radial-gradient(ellipse at 50% 0%,rgba(255,107,107,.08),transparent 70%)}
.sc:nth-child(3)::after{background:radial-gradient(ellipse at 50% 0%,rgba(81,207,102,.08),transparent 70%)}
.sc:nth-child(4)::after{background:radial-gradient(ellipse at 50% 0%,rgba(116,192,252,.08),transparent 70%)}
.sc .lbl,.metric-k{
  color:var(--text-muted);
  font-size:10px;
  font-weight:700;
  letter-spacing:.11em;
  text-transform:uppercase;
}
.sc .val,.metric-v{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-top:6px}
.sc .hint,.tiny{color:var(--text-secondary);font-size:12px;margin-top:8px}
.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0 12px;
  color:var(--text-muted);
  font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  transition:color .25s ease;
}
.divider::after{content:"";flex:1;height:1px;background:var(--border);transition:background .3s ease}
.divider:hover{color:var(--text)}
.divider:hover i:first-child{color:var(--accent)}
.divider:hover::after{background:linear-gradient(90deg,var(--accent),transparent 60%)}
.divider i:first-child{transition:color .25s ease}
.sh{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:8px}
.sh h2{
  font-size:16px;font-weight:800;letter-spacing:-.02em;
  position:relative;padding-bottom:6px;
}
.sh h2::after{
  content:"";position:absolute;bottom:0;left:0;width:24px;height:2px;border-radius:1px;
  background:linear-gradient(90deg,var(--accent),transparent);
  transition:width .3s ease;
}
.p:hover .sh h2::after{width:48px}
.sh span{color:var(--text-muted);font-size:12px}
.src{position:relative}
.src::before,.cc::before{
  content:"";
  position:absolute;top:0;left:0;right:0;height:3px;
  border-radius:var(--radius) var(--radius) 0 0;
}
.src.codex::before{background:linear-gradient(90deg,var(--codex),transparent)}
.src.claude::before{background:linear-gradient(90deg,var(--claude),transparent)}
.src.cursor::before{background:linear-gradient(90deg,var(--cursor),transparent)}
.cc.cost::before{background:linear-gradient(90deg,var(--cost),transparent)}
.cc.save::before{background:linear-gradient(90deg,var(--cache-read),transparent)}
.src .title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:700;font-size:14px}
.pill{
  padding:4px 10px;border-radius:999px;border:1px solid var(--border);
  color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
}
.src.codex .pill{border-color:rgba(255,138,80,.25);color:var(--codex)}
.src.claude .pill{border-color:rgba(255,212,59,.25);color:var(--claude)}
.src.cursor .pill{border-color:rgba(116,143,252,.25);color:var(--cursor)}
.src .big{font-size:32px;font-weight:900;letter-spacing:-.03em}
.src .sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.mi{
  padding:10px 12px;border-radius:10px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.05);
}
.mi .k{color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.mi .v{margin-top:4px;font-size:14px;font-weight:700}
.cc .big{font-size:24px;font-weight:900;letter-spacing:-.03em;margin-top:8px}
.chart{width:100%;height:300px}
.chart.tall{height:360px}
.chart.sm{height:280px}
.chart.short{height:240px}
.story{display:grid;gap:10px}
.si,.note{
  display:flex;gap:12px;align-items:flex-start;
  padding:12px 14px;border-radius:12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-left:2px solid transparent;
  transition:background .25s ease,border-color .25s ease,transform .3s cubic-bezier(.22,1,.36,1);
}
.si:hover,.note:hover{
  background:rgba(255,255,255,.07);
  border-left-color:var(--accent);
  transform:translateX(2px);
}
.si i,.note i{margin-top:3px;color:var(--accent);transition:transform .25s ease}
.si:hover i,.note:hover i{transform:scale(1.15)}
.nl{display:grid;gap:10px;margin-top:14px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;color:var(--text-secondary);font-size:12px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--border)}
th{color:var(--text-muted);font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
td{color:var(--text-secondary)}
tbody tr{transition:background .2s ease}
tbody tr:hover td{background:rgba(255,255,255,.04);color:var(--text)}
tbody tr:hover td:first-child{box-shadow:inset 2px 0 0 var(--accent)}
/* ── Number change flash ── */
@keyframes flash-up{
  0%{color:inherit;text-shadow:none}
  18%{color:#51cf66;text-shadow:0 0 10px rgba(81,207,102,.5)}
  50%{color:#51cf66;text-shadow:0 0 6px rgba(81,207,102,.3)}
  100%{color:inherit;text-shadow:none}
}
@keyframes flash-down{
  0%{color:inherit;text-shadow:none}
  18%{color:#ff6b6b;text-shadow:0 0 10px rgba(255,107,107,.5)}
  50%{color:#ff6b6b;text-shadow:0 0 6px rgba(255,107,107,.3)}
  100%{color:inherit;text-shadow:none}
}
.num-up{animation:flash-up 1.4s ease-out both}
.num-down{animation:flash-down 1.4s ease-out both}

/* ── Focus-visible accessibility ── */
.lang-btn:focus-visible,.theme-btn:focus-visible,.range-tab:focus-visible,.back-top:focus-visible,.divider:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}
.quick-nav a:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}
.footer{
  margin-top:16px;padding-top:14px;color:var(--text-muted);font-size:11px;line-height:1.65;
  border-top:1px solid var(--border);
  animation:hero-enter .5s cubic-bezier(.22,1,.36,1) .2s both;
}
.footer code{
  padding:2px 6px;border-radius:6px;
  background:rgba(255,255,255,.06);
  color:var(--text-secondary);
}
/* ── Card hover micro-interactions ── */
.p,.src,.cc,.sc,.mi{
  transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s cubic-bezier(.22,1,.36,1),border-color .3s ease,background .3s ease;
}
.src::after,.cc::after{
  content:"";position:absolute;inset:0;border-radius:inherit;opacity:0;
  transition:opacity .4s ease;pointer-events:none;
}
.src.codex::after{background:radial-gradient(ellipse at 50% 0%,rgba(255,138,80,.08),transparent 70%)}
.src.claude::after{background:radial-gradient(ellipse at 50% 0%,rgba(255,212,59,.08),transparent 70%)}
.src.cursor::after{background:radial-gradient(ellipse at 50% 0%,rgba(116,143,252,.08),transparent 70%)}
.cc.cost::after{background:radial-gradient(ellipse at 50% 0%,rgba(255,107,107,.06),transparent 70%)}
.cc.save::after{background:radial-gradient(ellipse at 50% 0%,rgba(81,207,102,.06),transparent 70%)}
.p:hover{box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 0 1px rgba(240,184,102,.08);border-color:rgba(240,184,102,.2)}
.src.codex:hover{border-color:rgba(255,138,80,.4);box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 24px rgba(255,138,80,.1),0 0 0 1px rgba(255,138,80,.1)}
.src.claude:hover{border-color:rgba(255,212,59,.4);box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 24px rgba(255,212,59,.1),0 0 0 1px rgba(255,212,59,.1)}
.src.cursor:hover{border-color:rgba(116,143,252,.4);box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 24px rgba(116,143,252,.1),0 0 0 1px rgba(116,143,252,.1)}
.cc.cost:hover{border-color:rgba(255,107,107,.4);box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 24px rgba(255,107,107,.1),0 0 0 1px rgba(255,107,107,.1)}
.cc.save:hover{border-color:rgba(81,207,102,.4);box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 24px rgba(81,207,102,.1),0 0 0 1px rgba(81,207,102,.1)}
.src:hover::after,.cc:hover::after{opacity:1}
.src:hover .big,.cc:hover .big{text-shadow:0 0 20px rgba(255,255,255,.08)}
.sc:hover{transform:translateY(-2px) scale(1.01);background:rgba(255,255,255,.07)}
.sc:hover::after{opacity:1}
.sc:nth-child(1):hover{border-color:rgba(255,138,80,.35);box-shadow:0 8px 32px rgba(255,138,80,.08)}
.sc:nth-child(2):hover{border-color:rgba(255,107,107,.35);box-shadow:0 8px 32px rgba(255,107,107,.08)}
.sc:nth-child(3):hover{border-color:rgba(81,207,102,.35);box-shadow:0 8px 32px rgba(81,207,102,.08)}
.sc:nth-child(4):hover{border-color:rgba(116,192,252,.35);box-shadow:0 8px 32px rgba(116,192,252,.08)}
.sc:hover .val{text-shadow:0 0 16px rgba(255,255,255,.1)}
.mi:hover{transform:translateY(-2px) scale(1.01);background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1)}

/* ── 6. Entry animations ── */
@keyframes hero-enter{
  0%{opacity:0;transform:translateY(16px)}
  100%{opacity:1;transform:translateY(0)}
}
.hero-wrap .eyebrow{animation:hero-enter .5s cubic-bezier(.22,1,.36,1) 0s both}
.hero-wrap .range-tabs{animation:hero-enter .5s cubic-bezier(.22,1,.36,1) .06s both}
.hero-wrap h1{animation:hero-enter .5s cubic-bezier(.22,1,.36,1) .12s both}
.hero-wrap .hero-copy{animation:hero-enter .5s cubic-bezier(.22,1,.36,1) .18s both}
.hero-wrap .chips{animation:hero-enter .5s cubic-bezier(.22,1,.36,1) .24s both}
.chip:nth-child(1){animation:hero-enter .45s cubic-bezier(.22,1,.36,1) .30s both}
.chip:nth-child(2){animation:hero-enter .45s cubic-bezier(.22,1,.36,1) .36s both}
.chip:nth-child(3){animation:hero-enter .45s cubic-bezier(.22,1,.36,1) .42s both}
.chip:nth-child(4){animation:hero-enter .45s cubic-bezier(.22,1,.36,1) .48s both}
.hero-wrap .hero-stats{animation:hero-enter .5s cubic-bezier(.22,1,.36,1) .28s both}
.hero-wrap .source-bar-wrap{animation:hero-enter .5s cubic-bezier(.22,1,.36,1) .34s both}

/* ── Section collapse ── */
.divider{cursor:pointer;scroll-margin-top:16px;user-select:none}

/* ── Quick navigation ── */
.quick-nav{
  position:fixed;right:8px;top:50%;transform:translateY(-50%);z-index:100;
  display:flex;flex-direction:column;gap:2px;
  padding:6px;border-radius:12px;
  background:rgba(13,16,22,.7);backdrop-filter:blur(12px);
  border:1px solid var(--border);opacity:.4;
  transition:opacity .3s ease,max-width .3s cubic-bezier(.22,1,.36,1);

.quick-nav a{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:8px;
  color:var(--text-muted);text-decoration:none;font-size:10px;font-weight:700;

}
.quick-nav a:hover{background:rgba(255,255,255,.08);color:var(--text)}
.quick-nav a.active{color:var(--accent);box-shadow:inset 2px 0 0 var(--accent)}
.quick-nav a i{width:16px;text-align:center;flex-shrink:0;font-size:11px}
.quick-nav a span{opacity:0;transition:opacity .2s}
.quick-nav:hover a span{opacity:1}

.back-top{
  position:fixed;right:16px;bottom:24px;z-index:100;
  width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  background:rgba(13,16,22,.75);backdrop-filter:blur(12px);

  display:flex;align-items:center;justify-content:center;

}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto}

/* ── Insight cards ── */
.insight-card{border-left:4px solid;padding:1rem;margin-bottom:.75rem;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-left:4px solid}

/* ── Reduced motion ── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
  html{scroll-behavior:auto}
}

/* ── Responsive breakpoints ── */
@media (max-width:1180px){
  .g4{grid-template-columns:1fr 1fr}
  .g-wide,.g-story{grid-template-columns:1fr}
  .page{padding:16px 6px 36px;width:calc(100vw - 24px)}
  .p{padding:14px}
  .hero-wrap{padding:24px 18px}
}
@media (max-width:900px){

}
@media (max-width:600px){

  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table-wrap table{min-width:640px}
  .quick-nav{display:none}
}

</style>

let isFirstRender = true;
const _isLight = () => document.documentElement.getAttribute('data-theme') === 'light';
const THEME_BASE = () => {
  const light = _isLight();
  return {
    textStyle: {color: light ? 'rgba(0,0,0,.6)' : TX, fontFamily: 'Inter,-apple-system,PingFang SC,sans-serif'},
    tooltip: {
      backgroundColor: light ? 'rgba(255,255,255,.96)' : 'rgba(15,18,28,.92)',
      borderColor: light ? 'rgba(0,0,0,.1)' : 'rgba(255,255,255,.08)',
      borderWidth: 1,
      textStyle: {color: light ? '#1a1a2e' : '#ece7df', fontSize: 12}
    }
  };
};
const chartTheme = () => ({...THEME_BASE(), animationDuration: isFirstRender ? 700 : 0});
const initChart = id => {
  if (chartCache[id]) {
    return chartCache[id];
  }
  const chart = echarts.init(document.getElementById(id), null, {renderer: 'canvas'});
  chartCache[id] = chart;
  charts.push(chart);
  return chart;
};

function clearCharts(){
  charts.forEach(chart => chart.dispose());
  charts.length = 0;
  Object.keys(chartCache).forEach(key => delete chartCache[key]);
}

/* ── Lazy chart rendering via IntersectionObserver ── */
const lazyQueue = [];
let lazyObserver = null;
const lazyRendered = new Set();
const lazyRenderFns = {};

function registerLazy(chartId, renderFn) {
  lazyRenderFns[chartId] = renderFn;
  lazyQueue.push({chartId, renderFn});
}

function flushLazy() {
  /* Re-render charts already visible (live-mode update) */
  if (lazyRendered.size > 0) {
    lazyRendered.forEach(id => {
      const fn = lazyRenderFns[id];
      if (fn) requestAnimationFrame(() => fn());
    });
    /* Observe any newly registered charts not yet seen */
    if (lazyObserver) {
      lazyQueue.forEach(item => {
        if (lazyRendered.has(item.chartId)) return;
        const el = document.getElementById(item.chartId);
        if (el) lazyObserver.observe(el);
      });
    }
    return;
  }

  /* First render: set up observer from scratch */
  if (typeof IntersectionObserver === 'undefined') {
    lazyQueue.forEach(item => item.renderFn());
    lazyQueue.length = 0;
    return;
  }

  if (lazyObserver) {
    lazyObserver.disconnect();
  }

  lazyObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const id = entry.target.id;
      if (lazyRendered.has(id)) return;
      lazyRendered.add(id);
      lazyObserver.unobserve(entry.target);
      const fn = lazyRenderFns[id];
      if (fn) {
        requestAnimationFrame(() => fn());
      }
    });
  }, {rootMargin: '200px 0px'});

  lazyQueue.forEach(item => {
    const el = document.getElementById(item.chartId);
    if (el) lazyObserver.observe(el);
  });
}

let toastTimer = null;
function showToast(message, type = 'info', duration = 3000){
  const el = document.getElementById('toast');
  if (!el) return;
  clearTimeout(toastTimer);
  el.className = 'toast ' + type;
  const icon = type === 'ok' ? '<i class="fa-solid fa-check"></i>'
    : type === 'err' ? '<i class="fa-solid fa-xmark"></i>'
    : '<span class="spinner"></span>';
  el.innerHTML = icon + ' ' + message;

function updateLiveBadge(state){
  const badge = document.getElementById('live-badge');
  if (!badge) return;
  badge.className = 'live-badge ' + state;
  badge.querySelector('.dot') || badge.insertAdjacentHTML('afterbegin','<span class="dot"></span>');
  const label = state === 'connected' ? t('badgeLive') : state === 'disconnected' ? t('badgeOffline') : t('badgeStatic');

    }

  if (isError) {

  } else {

  }
}

function setStreamStatus(message, isError = false){

  } else {

  }
  setStatus(message, isError);
}

async function fetchDashboardOnce(){
  if (!isLiveMode) return;
  const url = buildDashboardUrl();
  try {
    const res = await fetch(url, {cache: 'no-store'});
    if (!res.ok) {
      setStreamStatus(t('toastRefreshFail', {err: res.status + ' ' + res.statusText}), true);
      return;
    }
    const nextData = await res.json();
    if (!nextData || typeof nextData !== 'object') {
      setStreamStatus(t('toastRefreshEmpty'), true);
      return;
    }
    if (setDashboard(nextData)) {
      renderDashboard();
    }
    setStreamStatus(t('toastPollOk'));
  } catch (err) {
    setStreamStatus(t('toastRefreshFail', {err: String(err && err.message ? err.message : err)}), true);
    return;
  }
}

function stopStream(){
  if (refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
  if (streamSource && streamSource.readyState !== EventSource.CLOSED) {
    streamSource.close();
  }
  streamSource = null;
}

function startPollingFallback(){
  if (!isLiveMode || refreshTimer !== null) return;
  setStreamStatus(t('toastPollFallback'));
  fetchDashboardOnce();
  const intervalMs = Math.max(1000, Number(1000) || 5000);
  refreshTimer = setInterval(() => {
    void fetchDashboardOnce();
  }, intervalMs);
}

function startSseDashboard(){
  if (!isLiveMode || streamSource) return;
  if (typeof EventSource === 'undefined') {
    startPollingFallback();
    return;
  }

  try {
    streamSource = new EventSource(dashboardStreamUrl);
  } catch (err) {
    setStreamStatus(t('toastSseInitFail', {err: String(err && err.message ? err.message : err)}), true);
    startPollingFallback();
    return;
  }

  streamSource.onopen = () => {
    setStreamStatus(t('toastSseInit'));
  };

  streamSource.onerror = () => {
    setStreamStatus(t('toastSseReconnect'), true);
  };

  streamSource.onmessage = event => {
    try {
      const nextData = JSON.parse(event.data);
      if (setDashboard(nextData)) {
        renderDashboard();
      }
      setStreamStatus(t('toastSseOk'));
    } catch (err) {
      setStreamStatus(t('toastSseParseFail', {err: String(err && err.message ? err.message : err)}), true);
    }
  };
}

};

};

/* ── Number transition animation ── */
let _numPrevValues = new WeakMap();
/* Build a locked formatter that keeps the same decimal places / scale throughout animation */
function _lockFmt(formatter, targetVal) {
  const targetStr = formatter(targetVal);
  if (formatter === fmtShort) {
    const a = Math.abs(targetVal);
    if (a >= 1e9) return v => (v / 1e9).toFixed(2) + 'B';
    if (a >= 1e6) return v => (v / 1e6).toFixed(2) + 'M';
    if (a >= 1e3) return v => (v / 1e3).toFixed(1) + 'K';
    return v => String(Math.round(v));
  }
  if (formatter === fmtUSD) {
    const av = Math.abs(targetVal);
    if (av >= 1000) return v => '$' + v.toLocaleString('en-US', {maximumFractionDigits: 0});
    if (av >= 100) return v => '$' + v.toFixed(1);
    if (av >= 1) return v => '$' + v.toFixed(2);
    if (av >= 0.01) return v => '$' + v.toFixed(3);
    return v => '$' + v.toFixed(4);
  }
  if (formatter === fmtPct) {
    return v => ((Number(v || 0) * 100).toFixed(1)) + '%';
  }
  if (formatter === fmtInt) {
    return v => Math.round(v).toLocaleString('en-US');
  }
  return formatter;
}
function animateNum(el, newRaw, formatter) {
  if (!el) return;
  const newVal = Number(newRaw) || 0;
  const oldVal = _numPrevValues.has(el) ? _numPrevValues.get(el) : newVal;
  _numPrevValues.set(el, newVal);
  if (isFirstRender || oldVal === newVal) {
    el.textContent = formatter(newVal);
    return;
  }
  /* Stock-style color flash */
  const dir = newVal > oldVal ? 'num-up' : 'num-down';
  el.classList.remove('num-up', 'num-down');
  /* Force reflow so re-adding the same class restarts the animation */
  void el.offsetWidth;
  el.classList.add(dir);
  const locked = _lockFmt(formatter, newVal);
  const duration = 600;
  const startTime = performance.now();
  const step = (now) => {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const cur = oldVal + (newVal - oldVal) * ease;
    el.textContent = locked(cur);
    if (t < 1) requestAnimationFrame(step);
    else { _numPrevValues.set(el, newVal); el.textContent = formatter(newVal); }
  };
  requestAnimationFrame(step);
}

function renderRangeTabs(){
  const el = document.getElementById('range-tabs');
  if (!el) return;
  const allLabel = defaultSince ? t('rangeFrom', {since: defaultSince}) : t('rangeDays', {days: defaultDays});
  const tabs = [
    {key: 'all', label: allLabel},
    {key: 'week', label: t('rangeWeek')},
    {key: 'today', label: t('rangeToday')}
  ];
  el.innerHTML = tabs.map(t =>
    `<button class="range-tab${t.key === activeRangeKey ? ' active' : ''}" data-range="${t.key}">${t.label}</button>`
  ).join('');
  el.querySelectorAll('.range-tab').forEach(btn => {
    btn.addEventListener('click', () => switchRange(btn.dataset.range));
  });
}

async function switchRange(key){
  if (key === activeRangeKey) return;
  activeRangeKey = key;
  dashboardApiUrl = _apiUrl(key);
  dashboardStreamUrl = _streamUrl(key);
  lastDashboardHash = '';
  /* Clear prev values so numbers animate on tab switch */
  _numPrevValues = new WeakMap();
  isFirstRender = false;
  renderRangeTabs();
  if (isLiveMode) {
    stopStream();
    /* Fetch once immediately, then reconnect SSE */
    await fetchDashboardOnce();
    startSseDashboard();
  } else {
    /* Static mode: fetch from API if available, otherwise we can't switch */
    try {
      const res = await fetch(dashboardApiUrl, {cache: 'no-store'});
      if (res.ok) {
        const nextData = await res.json();
        data = nextData;
        lastDashboardHash = (nextData._meta || {}).generated_at || '';
        renderDashboard();
      }
    } catch (e) {
      showToast(t('toastSwitchFail', {err: e.message || e}), 'err', 3000);
    }
  }
}

function bootDashboard(){
  document.getElementById('lang-btn').textContent = '\u{1F310} ' + lang.toUpperCase();
  applyI18n();
  document.getElementById('hero-title').textContent = t('heroTitle');
  renderRangeTabs();
  if (data && data.totals) {
    if (!isLiveMode) updateLiveBadge('off');
    renderDashboard();
    return;
  }
  if (!isLiveMode) {
    updateLiveBadge('off');
    document.getElementById('hero-copy').textContent = t('heroNoData');
    return;
  }
  startSseDashboard();
}

/* ── Section collapse / expand ── */
const COLLAPSE_KEY = 'atlas-collapsed';
function _loadCollapsed(){try{return JSON.parse(localStorage.getItem(COLLAPSE_KEY))||{}}catch(e){return{}}}
function _saveCollapsed(state){localStorage.setItem(COLLAPSE_KEY,JSON.stringify(state))}

function initCollapse(){
  const state = _loadCollapsed();
  document.querySelectorAll('.divider[id]').forEach(div => {
    const id = div.id;
    const wrap = document.querySelector(`.section-wrap[data-section="${id}"]`);
    if (!wrap) return;
    /* Restore saved state */
    if (state[id]) {
      div.classList.add('collapsed');
      wrap.classList.add('collapsed');
      wrap.style.maxHeight = '0';
    } else {
      wrap.style.maxHeight = wrap.scrollHeight + 'px';
    }
    div.addEventListener('click', (e) => {
      /* Don't trigger on anchor link clicks inside nav */
      if (e.target.closest('a')) return;
      const isCollapsed = wrap.classList.toggle('collapsed');
      div.classList.toggle('collapsed', isCollapsed);
      const cs = _loadCollapsed();
      if (isCollapsed) {
        wrap.style.maxHeight = wrap.scrollHeight + 'px';
        requestAnimationFrame(() => { wrap.style.maxHeight = '0'; });
        cs[id] = true;
      } else {
        wrap.style.maxHeight = wrap.scrollHeight + 'px';
        cs[id] = false;
        /* Resize charts inside the section after expand animation */
        setTimeout(() => {
          wrap.style.maxHeight = 'none';
          wrap.querySelectorAll('.chart').forEach(el => {
            const c = chartCache[el.id];
            if (c) c.resize();
          });
          /* Trigger lazy observer for charts that haven't rendered yet */
          if (lazyObserver) {
            wrap.querySelectorAll('.chart').forEach(el => {
              if (!lazyRendered.has(el.id)) lazyObserver.observe(el);
            });
          }
        }, 420);
      }
      _saveCollapsed(cs);
    });
  });
}

/* ── Quick nav scroll highlight + back-to-top ── */
function initQuickNav(){
  const backTop = document.getElementById('back-top');
  const navLinks = document.querySelectorAll('.quick-nav a');
  const sectionIds = Array.from(navLinks).map(a => a.getAttribute('href').slice(1));

  window.addEventListener('scroll', () => {
    /* Back-to-top visibility */
    if (backTop) backTop.classList.toggle('show', window.scrollY > 400);
    /* Active section highlight */
    let currentId = sectionIds[0];
    for (const id of sectionIds) {
      const el = document.getElementById(id);
      if (el && el.getBoundingClientRect().top <= 80) currentId = id;
    }
    navLinks.forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + currentId);
    });
  }, {passive: true});

  /* Smooth scroll for nav links */
  navLinks.forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const id = a.getAttribute('href').slice(1);
      const el = document.getElementById(id);
      if (el) {
        /* Expand section if collapsed */
        const wrap = document.querySelector(`.section-wrap[data-section="${id}"]`);
        if (wrap && wrap.classList.contains('collapsed')) {
          el.click();
        }
        el.scrollIntoView({behavior: 'smooth'});
      }
    });
  });
}

/* Update max-height after data re-render (for non-collapsed sections) */
function refreshSectionHeights(){
  document.querySelectorAll('.section-wrap').forEach(wrap => {
    if (!wrap.classList.contains('collapsed')) {
      wrap.style.maxHeight = 'none';
    }
  });
}
